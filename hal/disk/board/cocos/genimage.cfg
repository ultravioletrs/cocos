image efi-part.vfat {
    vfat {
        file EFI {
            image = "efi-part/EFI"
        }
        file bzImage {
            image = "efi-part/bzImage"
        }
        file initrd.cpio.gz {
            image = "efi-part/initrd.cpio.gz"
        }
    }
    size = 256M
}

image disk.img {
    hdimage {
        partition-table-type = "gpt"
    }

    partition efi {
        image = "efi-part.vfat"
        partition-type-uuid = "C12A7328-F81F-11D2-BA4B-00A0C93EC93B"
        offset = 1M
        bootable = true
    }

    partition root {
        image = "rootfs.ext4"
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    }

    partition verity {
        image = "rootfs.verity"
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    }

    partition cocos {
        size = "20480M"
        partition-type-uuid = "0FC63DAF-8483-4772-8E79-3D69D8477DE4"
    }
}
